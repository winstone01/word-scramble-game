<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <script src="JS/words.js" defer ></script>
        <script src="JS/script.js" defer ></script>
        <title>Word Scramble Game Vol 2</title>
    </head>
    <body>
        <div class="container">
            <h2>Word Scramble Game </h2>
            <div class="content">
                <p class="word">example</p>
                <div class="details">
                    <p class="hint">Hint: <span>The process of increase or grow</span> </p>
                    <p class="time">Time Left: <span><b>30</b>.s</span> </p>
                </div>
                <input type="text" placeholder="Please enter a valid word">
                <div class="buttons">
                    <button class="refresh-word">Refresh Word</button>
                    <button class="check-word">Check Word</button>
                </div>
            </div>
        </div>
    </body>
</html>
